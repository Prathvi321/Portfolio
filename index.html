<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prathvi - The Polymath's Canvas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Custom CSS for animations */
        @keyframes fadeInFromBottom {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInFromLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeInFromRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        .blinking-cursor {
            animation: blink 0.7s infinite;
        }

        .animate-fade-in-up {
            animation: fadeInFromBottom 1s ease-out forwards;
            opacity: 0;
        }

        .animate-fade-in-left {
            animation: fadeInFromLeft 1s ease-out forwards;
            opacity: 0;
        }

        .animate-fade-in-right {
            animation: fadeInFromRight 1s ease-out forwards;
            opacity: 0;
        }

        /* Staggered animation delays */
        .delay-100 {
            animation-delay: 0.1s;
        }

        .delay-200 {
            animation-delay: 0.2s;
        }

        .delay-300 {
            animation-delay: 0.3s;
        }

        .delay-400 {
            animation-delay: 0.4s;
        }

        .delay-500 {
            animation-delay: 0.5s;
        }

        .delay-600 {
            animation-delay: 0.6s;
        }

        .delay-700 {
            animation-delay: 0.7s;
        }

        .delay-800 {
            animation-delay: 0.8s;
        }

        .delay-900 {
            animation-delay: 0.9s;
        }

        .delay-1000 {
            animation-delay: 1s;
        }

        /* Ensure smooth scrolling for navigation */
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>

<body class="min-h-screen bg-gradient-to-br from-gray-50 to-gray-200 text-gray-900 font-inter antialiased">
    <div id="root"></div>

    <script type="text/babel">
        // React components are defined here.
        // All state management and component logic from the React code is preserved.

        // Main App component
        const App = () => {
            // State to manage the current active section for navigation (for highlighting in navbar)
            const [activeSection, setActiveSection] = React.useState('home');

            // Function to handle navigation clicks and smooth scrolling
            const navigateTo = (sectionId) => {
                setActiveSection(sectionId);
                document.getElementById(sectionId)?.scrollIntoView({ behavior: 'smooth' });
            };

            // Effect to update activeSection based on scroll position for navbar highlighting
            React.useEffect(() => {
                const handleScroll = () => {
                    const sections = ['home', 'about-me', 'technical-prowess', 'creative-corner', 'leadership-communication', 'contact'];
                    let currentActive = 'home';
                    for (let i = sections.length - 1; i >= 0; i--) {
                        const section = document.getElementById(sections[i]);
                        if (section) {
                            const rect = section.getBoundingClientRect();
                            // Check if the section is mostly in view (e.g., more than 20% from top)
                            if (rect.top <= window.innerHeight * 0.2 && rect.bottom >= window.innerHeight * 0.2) {
                                currentActive = sections[i];
                                break;
                            }
                        }
                    }
                    setActiveSection(currentActive);
                };

                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <div className="min-h-screen bg-gradient-to-br from-gray-50 to-gray-200 text-gray-900 font-inter antialiased">
                    {/* Navigation Bar */}
                    <Navbar navigateTo={navigateTo} activeSection={activeSection} />

                    {/* Main content area */}
                    <main className="pt-20"> {/* Add padding-top to account for fixed navbar */}
                        <Home navigateTo={navigateTo} />
                        <AboutMe />
                        <TechnicalProwess />
                        <CreativeCorner />
                        <LeadershipCommunication />
                        <Contact />
                    </main>

                    {/* Footer */}
                    <Footer />
                </div>
            );
        };

        // Navbar Component
        const Navbar = ({ navigateTo, activeSection }) => {
            const [isOpen, setIsOpen] = React.useState(false);

            const navItems = [
                { id: 'home', name: 'Home' },
                { id: 'about-me', name: 'About Me' },
                { id: 'technical-prowess', name: 'Technical Prowess' },
                { id: 'creative-corner', name: 'Creative Corner' },
                { id: 'leadership-communication', name: 'Leadership & Communication' },
                { id: 'contact', name: 'Contact' },
            ];

            return (
                <nav className="fixed top-0 left-0 w-full bg-white bg-opacity-80 backdrop-blur-md z-50 shadow-lg border-b border-blue-200">
                    <div className="container mx-auto px-6 py-4 flex justify-between items-center">
                        {/* Logo/Site Title */}
                        <div className="flex items-center space-x-2">
                            {/* Using a simple SVG icon for the logo - abstract tech/creativity */}
                            <svg className="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
                            </svg>
                            <span className="text-2xl font-extrabold text-blue-600 tracking-wider">Prathvi</span>
                        </div>

                        {/* Desktop Navigation */}
                        <div className="hidden md:flex space-x-8">
                            {navItems.map(item => (
                                <button
                                    key={item.id}
                                    onClick={() => navigateTo(item.id)}
                                    className={`text-gray-700 hover:text-blue-600 transition-colors duration-300 font-medium relative group
                                        ${activeSection === item.id ? 'text-blue-600 font-semibold' : ''}`}
                                >
                                    {item.name}
                                    {/* Active indicator */}
                                    <span className={`absolute bottom-0 left-1/2 w-0 h-0.5 bg-blue-600 transform -translate-x-1/2 group-hover:w-full transition-all duration-300
                                        ${activeSection === item.id ? 'w-full' : ''}`}></span>
                                </button>
                            ))}
                        </div>

                        {/* Mobile Menu Button */}
                        <div className="md:hidden">
                            <button onClick={() => setIsOpen(!isOpen)} className="text-gray-700 focus:outline-none focus:text-blue-600">
                                <svg className="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path>

                                    )}
                                </svg>
                            </button>
                        </div>
                    </div>

                    {/* Mobile Navigation Menu */}
                    {isOpen && (
                        <div className="md:hidden bg-white pb-4 border-t border-blue-200">

                                {navItems.map(item => (
                                    <button
                                        key={item.id}

                                    </button>
                                ))}
                            </div>
                        </div>
                    )}
                </nav>
            );
        };

        // Home Section Component
        const Home = ({ navigateTo }) => {
            // State for the typewriter effect
            const [currentTaglineIndex, setCurrentTaglineIndex] = React.useState(0);
            const [currentText, setCurrentText] = React.useState('');
            const [isDeleting, setIsDeleting] = React.useState(false);
            const [typingSpeed, setTypingSpeed] = React.useState(150);

            const taglines = [
                "Python Developer", "Web Innovator", "DevOps Enthusiast", "AI Explorer", "Game Creator", "3D Artist", "Strategic Trader", "Polymath"
            ];

            React.useEffect(() => {
                let timer;
                const handleTyping = () => {
                    const fullText = taglines[currentTaglineIndex];
                    if (isDeleting) {
                        setCurrentText(fullText.substring(0, currentText.length - 1));
                        setTypingSpeed(75); // Faster deleting
                    } else {
                        setCurrentText(fullText.substring(0, currentText.length + 1));
                        setTypingSpeed(150); // Slower typing
                    }

                    if (!isDeleting && currentText === fullText) {
                        setTypingSpeed(1500); // Pause at end of typing
                        setIsDeleting(true);
                    } else if (isDeleting && currentText === '') {
                        setIsDeleting(false);
                        setCurrentTaglineIndex((prev) => (prev + 1) % taglines.length);
                        setTypingSpeed(200); // Pause before typing next
                    }
                };

                timer = setTimeout(handleTyping, typingSpeed);

                return () => clearTimeout(timer);
            }, [currentText, isDeleting, typingSpeed, currentTaglineIndex, taglines]);

            return (
                <section id="home" className="relative h-screen flex items-center justify-center text-center overflow-hidden p-4">

                                Get in Touch
                            </button>
                        </div>
                    </div>
                </section>
            );
        };

                            <div className="md:w-2/3 text-lg leading-relaxed bg-white p-10 rounded-3xl shadow-xl border border-blue-300 animate-fade-in-right">

                                </p>

                                <div className="flex flex-col items-center text-center p-6 bg-white rounded-2xl shadow-xl border border-blue-300 mb-8 md:mb-0 w-full md:w-1/3 animate-fade-in-up delay-200 min-h-[220px]"> {/* Added min-h for consistent height */}
                                    <div className="bg-blue-600 rounded-full w-12 h-12 flex items-center justify-center shadow-lg -mt-12 mb-4"> {/* Adjusted margin for top icon */}
                                        <span className="text-2xl text-white">📚</span> {/* Icon for 10th Grade */}
                                    </div>
                                    <p className="mb-2 text-base text-blue-600">2022</p>
                                    <h4 className="mb-2 font-bold text-xl text-gray-900">10th Grade</h4>
                                    <p className="text-sm leading-snug text-gray-700">St. Mary's Convent, Sagar</p>
                                    <p className="text-sm leading-snug text-gray-700">Scored: 78%</p>
                                </div>

                                {/* Education Item 2 - 12th Grade */}
                                <div className="flex flex-col items-center text-center p-6 bg-white rounded-2xl shadow-xl border border-blue-300 mb-8 md:mb-0 w-full md:w-1/3 animate-fade-in-up delay-200 min-h-[220px]"> {/* Added min-h for consistent height */}
                                    <div className="bg-blue-600 rounded-full w-12 h-12 flex items-center justify-center shadow-lg -mt-12 mb-4"> {/* Adjusted margin for top icon */}
                                        <span className="text-2xl text-white">📚</span> {/* Icon for 12th Grade */}
                                    </div>
                                    <p className="mb-2 text-base text-blue-600">2024</p>
                                    <h4 className="mb-2 font-bold text-xl text-gray-900">12th Grade</h4>
                                    <p className="text-sm leading-snug text-gray-700">Kendriya Vidyalaya Sagar</p>
                                    <p className="text-sm leading-snug text-gray-700">Scored: 76%</p>
                                </div>

                                {/* Education Item 3 - DCA */}
                                <div className="flex flex-col items-center text-center p-6 bg-white rounded-2xl shadow-xl border border-blue-300 mb-8 md:mb-0 w-full md:w-1/3 animate-fade-in-up delay-400 min-h-[220px]"> {/* Added min-h for consistent height */}
                                    <div className="bg-blue-600 rounded-full w-12 h-12 flex items-center justify-center shadow-lg -mt-12 mb-4"> {/* Adjusted margin for top icon */}
                                        <span className="text-2xl text-white">💻</span> {/* Icon for DCA */}
                                    </div>
                                    <p className="mb-2 text-base text-blue-600">2024 - 2025</p>
                                    <h4 className="mb-2 font-bold text-xl text-gray-900">DCA</h4>
                                    <p className="text-sm leading-snug text-gray-700">Makhanlal Chaturvedi University Bhopal</p>
                                    <p className="text-sm leading-snug text-gray-700">CGPA: [Yet to be declared]</p>
                                </div>

                                {/* Education Item 4 - B.Tech */}
                                <div className="flex flex-col items-center text-center p-6 bg-white rounded-2xl shadow-xl border border-blue-300 w-full md:w-1/3 animate-fade-in-up delay-600 min-h-[220px]"> {/* Added min-h for consistent height */}
                                    <div className="bg-blue-600 rounded-full w-12 h-12 flex items-center justify-center shadow-lg -mt-12 mb-4"> {/* Adjusted margin for top icon */}

                                    <p className="mb-2 text-base text-blue-600">2024 - 2028</p>
                                    <h4 className="mb-2 font-bold text-xl text-gray-900">B.Tech (IT)</h4>
                                    <p className="text-sm leading-snug text-gray-700">RGPV Bhopal</p>
                                    <p className="text-sm leading-snug text-gray-700">CGPA: [Yet to be declared]</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        // Technical Prowess Section Component
        const TechnicalProwess = () => {

            const skills = [
                'All', 'Python (DSA)', 'Web Development', 'DevOps', 'AI/ML', 'Game Development'

            const projects = [

        ReactDOM.createRoot(document.getElementById('root')).render(
            <App />);
    </script>
